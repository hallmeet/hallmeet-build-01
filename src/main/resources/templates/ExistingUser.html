<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{student-base::layout(~{::section})}">
<head>
    <meta charset="utf-8">
    <title>Update Student Details</title>
</head>
<body>
    <section th:fragment="content">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">
                    <i class="fas fa-user-edit mr-2"></i>Update Student Details
                </h3>
            </div>
            <div class="card-body">
                <div th:if="${session.msg}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle mr-1"></i>
                    <span th:text="${session.msg}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                
                <form method="post" th:action="${'/update-student/' + user.id}" enctype="multipart/form-data" id="updateForm">
                    <input type="hidden" name="formToken" th:value="${formToken}">
                    <input type="hidden" th:value="${user.id}" name="id">
                    <input type="hidden" th:value="${user.email}" name="email">
                    <input type="hidden" th:value="${user.fullName}" name="fullName">
                    <input type="hidden" th:value="${user.mobileNo}" name="mobileNo">
                    <input type="hidden" th:value="${user.DateOfBirth}" name="DateOfBirth">
                    <input type="hidden" th:value="${user.instituteName}" name="instituteName">
                    <input type="hidden" th:value="${user.Course}" name="Course">
                    <input type="hidden" th:value="${user.email}" name="username">
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>
                                    <i class="fas fa-user mr-1"></i>Full Name
                                </label>
                                <div class="form-control bg-light" th:text="${user.fullName}"></div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>
                                    <i class="fas fa-envelope mr-1"></i>Email
                                </label>
                                <div class="form-control bg-light" th:text="${user.email}"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>
                                    <i class="fas fa-phone mr-1"></i>Mobile Number
                                </label>
                                <div class="form-control bg-light" th:text="${user.mobileNo}"></div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>
                                    <i class="fas fa-calendar-alt mr-1"></i>Date of Birth
                                </label>
                                <div class="form-control bg-light" th:text="${user.DateOfBirth}"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-12">
                            <div class="form-group">
                                <label>
                                    <i class="fas fa-university mr-1"></i>Institute Name
                                </label>
                                <div class="form-control bg-light" th:text="${user.instituteName}"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>
                                    <i class="fas fa-graduation-cap mr-1"></i>Course
                                </label>
                                <div class="form-control bg-light" th:text="${user.Course}"></div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="admissionYear">
                                    <i class="fas fa-calendar-check mr-1"></i>Admission Year <span class="text-danger">*</span>
                                </label>
                                <select name="AdmissionForYear" id="admissionYear" class="form-control" required>
                                    <option th:value="1" th:selected="${user.AdmissionForYear == '1'}">1</option>
                                    <option th:value="2" th:selected="${user.AdmissionForYear == '2'}">2</option>
                                    <option th:value="3" th:selected="${user.AdmissionForYear == '3'}">3</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="semister">
                                    <i class="fas fa-book mr-1"></i>Semester <span class="text-danger">*</span>
                                </label>
                                <select name="Semister" id="semister" class="form-control" required>
                                    <option th:value="1" th:selected="${user.Semister == '1'}">1</option>
                                    <option th:value="2" th:selected="${user.Semister == '2'}">2</option>
                                    <option th:value="3" th:selected="${user.Semister == '3'}">3</option>
                                    <option th:value="4" th:selected="${user.Semister == '4'}">4</option>
                                    <option th:value="5" th:selected="${user.Semister == '5'}">5</option>
                                    <option th:value="6" th:selected="${user.Semister == '6'}">6</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>
                                    <i class="fas fa-image mr-1"></i>Current Profile Image
                                </label>
                                <div th:if="${user.imageName != null and !user.imageName.isEmpty()}">
                                    <img th:src="@{'/img/' + ${user.imageName}}" 
                                         alt="Profile Image" 
                                         class="img-thumbnail" 
                                         style="max-width: 200px; max-height: 200px;">
                                </div>
                                <div th:if="${user.imageName == null or user.imageName.isEmpty()}" class="text-muted">
                                    No image uploaded
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="profileImage">
                                    <i class="fas fa-upload mr-1"></i>Update Profile Image
                                </label>
                                <div class="custom-file">
                                    <input type="file" name="img" class="custom-file-input" id="profileImage" accept="image/*">
                                    <label class="custom-file-label" for="profileImage">Choose new image</label>
                                </div>
                                <small class="form-text text-muted">Leave empty to keep current image</small>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group mt-4">
                        <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                            <i class="fas fa-save mr-1"></i>Update Details
                        </button>
                        <a th:href="@{'/UserHomePage?username=' + ${user.email} + '#profile-section'}" class="btn btn-secondary btn-lg ml-2">
                            <i class="fas fa-arrow-left mr-1"></i>Back to Home
                        </a>
                    </div>
                </form>
            </div>
        </div>
        
        <script th:inline="none">
            // Update file input label
            document.getElementById('profileImage').addEventListener('change', function(e) {
                var fileName = e.target.files[0] ? e.target.files[0].name : 'Choose new image';
                e.target.nextElementSibling.textContent = fileName;
            });
            
            // Form submission handler
            document.getElementById('updateForm').addEventListener('submit', function() {
                var submitBtn = document.getElementById('submitBtn');
                if (submitBtn) {
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm mr-1"></span>Updating...';
                }
            });
        </script>
    </section>
</body>
</html>

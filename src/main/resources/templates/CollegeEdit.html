<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin-base::layout(~{::section})}">
<head>
    <meta charset="utf-8">
    <title th:text="${college.id != null ? 'Edit Institute' : 'Add Institute'}">Institute Form</title>
</head>
<body>
    <section th:fragment="content">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">
                    <i class="fas fa-university mr-2"></i>
                    <span th:text="${college.id != null ? 'Edit Institute' : 'Add New Institute'}">Institute Form</span>
                </h3>
                <div class="card-tools">
                    <a href="/collegeList-form" class="btn btn-secondary btn-sm">
                        <i class="fas fa-arrow-left mr-1"></i>Back to List
                    </a>
                </div>
            </div>
            <div class="card-body">
                <!-- Success Message -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <strong><i class="fas fa-check-circle mr-1"></i>Success:</strong> <span th:text="${success}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                
                <!-- Error Message -->
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <strong><i class="fas fa-exclamation-circle mr-1"></i>Error:</strong> <span th:text="${error}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                
                <form action="#" th:action="@{/save_new}" th:object="${college}" method="post" id="collegeForm">
                    <input type="hidden" th:field="*{id}" />
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="collegeName">
                                    <i class="fas fa-building mr-1"></i>Institute Name <span class="text-danger">*</span>
                                </label>
                                <input type="text" 
                                       th:field="*{instituteName}" 
                                       class="form-control" 
                                       id="collegeName"
                                       placeholder="Enter institute name"
                                       required />
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="address">
                                    <i class="fas fa-map-marker-alt mr-1"></i>Address <span class="text-danger">*</span>
                                </label>
                                <input type="text" 
                                       th:field="*{address}" 
                                       class="form-control" 
                                       id="address"
                                       placeholder="Enter address"
                                       required />
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group mt-3">
                        <button type="submit" class="btn btn-primary" id="saveBtn">
                            <span id="saveSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                            <i class="fas fa-save mr-1"></i>
                            <span id="saveText">Save</span>
                        </button>
                        <a href="/collegeList-form" class="btn btn-secondary ml-2">
                            <i class="fas fa-times mr-1"></i>Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
        
        <script th:inline="none">
            document.getElementById('collegeForm').addEventListener('submit', function() {
                var saveBtn = document.getElementById('saveBtn');
                var saveSpinner = document.getElementById('saveSpinner');
                var saveText = document.getElementById('saveText');
                
                if (saveBtn && saveSpinner && saveText) {
                    saveBtn.disabled = true;
                    saveSpinner.classList.remove('d-none');
                    saveText.textContent = 'Saving...';
                }
            });
        </script>
    </section>
</body>
</html>

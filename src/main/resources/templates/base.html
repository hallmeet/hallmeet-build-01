<script>
    document.addEventListener("DOMContentLoaded", function () {
        setTimeout(function() {
            var alerts = document.querySelectorAll('.alert');
            alerts.forEach(function(alert) {
                if (typeof $ !== 'undefined' && $.fn.alert) {
                    $(alert).alert('close');
                } else {
                    alert.style.display = 'none';
                }
            });
        }, 5000);

    });
</script>

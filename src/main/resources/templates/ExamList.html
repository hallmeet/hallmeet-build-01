<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin-base::layout(~{::section})}">
<head>
    <meta charset="utf-8">
    <title>Exam Management</title>
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.bootstrap4.min.css">
</head>
<body>
    <section th:fragment="content">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-clipboard-list mr-2"></i>Exam Management</h3>
                <div class="card-tools">
                    <a href="/new3" class="btn btn-primary btn-sm">
                        <i class="fas fa-plus mr-1"></i>Add New Exam
                    </a>
                </div>
            </div>
            <div class="card-body">
                <style>
                    #examTable thead th {
                        vertical-align: middle;
                        text-align: center;
                        background-color: #f0f4ff;
                        color: #4f46e5;
                        font-weight: 600;
                        white-space: nowrap;
                        border-bottom: 2px solid #e2e8f0;
                    }
                    #examTable tbody td {
                        vertical-align: middle;
                        text-align: center;
                    }
                    #examTable tbody td:nth-child(2),
                    #examTable tbody td:nth-child(3) {
                        text-align: left;
                    }
                </style>
                <div class="table-wrap">
                    <table id="examTable" class="table table-bordered table-striped table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Exam Name</th>
                                <th>Course</th>
                                <th>Year</th>
                                <th>Semester</th>
                                <th>Subject 1</th>
                                <th>Subject 2</th>
                                <th>Subject 3</th>
                                <th>Subject 4</th>
                                <th>Subject 5</th>
                                <th>Subject 6</th>
                                <th style="min-width: 100px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="exam, stat : ${listExam}">
                                <td th:text="${stat.count}"></td>
                                <td th:text="${exam?.examName ?: exam?.ExamName ?: 'N/A'}"></td>
                                <td th:text="${exam.Course}"></td>
                                <td th:text="${exam.Year}"></td>
                                <td th:text="${exam.Semister}"></td>
                                <td th:text="${#lists.size(exam.subjects) >= 1 ? exam.subjects[0].name : (exam.Sub1 ?: 'N/A')}"></td>
                                <td th:text="${#lists.size(exam.subjects) >= 2 ? exam.subjects[1].name : (exam.Sub2 ?: 'N/A')}"></td>
                                <td th:text="${#lists.size(exam.subjects) >= 3 ? exam.subjects[2].name : (exam.Sub3 ?: 'N/A')}"></td>
                                <td th:text="${#lists.size(exam.subjects) >= 4 ? exam.subjects[4-1].name : (exam.Sub4 ?: 'N/A')}"></td>
                                <td th:text="${#lists.size(exam.subjects) >= 5 ? exam.subjects[5-1].name : (exam.Sub5 ?: 'N/A')}"></td>
                                <td th:text="${#lists.size(exam.subjects) >= 6 ? exam.subjects[6-1].name : (exam.Sub6 ?: 'N/A')}"></td>
                                <td>
                                    <a class="btn btn-sm btn-primary" th:href="@{'/edit3/' + ${exam.id}}" title="Edit">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a class="btn btn-sm btn-danger" th:href="@{'/delete3/' + ${exam.id}}" 
                                       onclick="return confirm('Are you sure you want to delete this exam?');" title="Delete">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- DataTables JS -->
        <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
        <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
        <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap4.min.js"></script>
        <script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
        <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.bootstrap4.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
        <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>
        <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.print.min.js"></script>

        <script th:inline="none">
            $(document).ready(function() {
                $('#examTable').DataTable({
                    "responsive": true,
                    "lengthChange": true,
                    "autoWidth": false,
                    "pageLength": 10,
                    "order": [[0, 'desc']],
                    "dom": 'Bfrtip',
                    "buttons": [
                        {
                            extend: 'copy',
                            text: '<i class="fas fa-copy"></i> Copy',
                            className: 'btn btn-sm btn-secondary'
                        },
                        {
                            extend: 'csv',
                            text: '<i class="fas fa-file-csv"></i> CSV',
                            className: 'btn btn-sm btn-info'
                        },
                        {
                            extend: 'excel',
                            text: '<i class="fas fa-file-excel"></i> Excel',
                            className: 'btn btn-sm btn-success'
                        },
                        {
                            extend: 'pdf',
                            text: '<i class="fas fa-file-pdf"></i> PDF',
                            className: 'btn btn-sm btn-danger'
                        },
                        {
                            extend: 'print',
                            text: '<i class="fas fa-print"></i> Print',
                            className: 'btn btn-sm btn-warning'
                        }
                    ],
                    "language": {
                        "search": "Search:",
                        "lengthMenu": "Show _MENU_ entries",
                        "info": "Showing _START_ to _END_ of _TOTAL_ entries",
                        "infoEmpty": "No entries to show",
                        "infoFiltered": "(filtered from _MAX_ total entries)"
                    }
                });
            });
        </script>
    </section>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin-base::layout(~{::section})}">
<head>
    <meta charset="utf-8">
    <title>Student Management</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.bootstrap4.min.css">
</head>
<body>
    <section th:fragment="content">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-users mr-2"></i>Student Management</h3>
            </div>
            <div class="card-body">
                <style>
                    #studentTable thead th {
                        vertical-align: middle; text-align: center;
                        background-color: #f0f4ff; color: #4f46e5;
                        font-weight: 600; white-space: nowrap;
                        border-bottom: 2px solid #e2e8f0;
                    }
                    #studentTable tbody td { vertical-align: middle; text-align: center; }
                    #studentTable tbody td:nth-child(2),
                    #studentTable tbody td:nth-child(3) { text-align: left; }

                    /* ── Password Modal ── */
                    #changePasswordModal .modal-header {
                        background: linear-gradient(135deg, #4f46e5, #7c3aed);
                        color: #fff; border-radius: 0;
                    }
                    #changePasswordModal .modal-header .close { color: #fff; opacity: 0.85; }
                    #changePasswordModal .modal-header .close:hover { opacity: 1; }
                    .pw-field-wrap { position: relative; }
                    .pw-toggle {
                        position: absolute; right: 12px; top: 50%;
                        transform: translateY(-50%);
                        cursor: pointer; color: #94a3b8; font-size: 1rem;
                        background: none; border: none; padding: 0; line-height: 1;
                    }
                    .pw-toggle:hover { color: #4f46e5; }
                    .pw-field-wrap input { padding-right: 38px !important; }
                    .student-badge {
                        display: inline-flex; align-items: center; gap: 6px;
                        background: #eef2ff; color: #4f46e5;
                        padding: 5px 14px; border-radius: 20px;
                        font-weight: 600; font-size: 0.85rem; margin-bottom: 14px;
                    }
                    .current-pw-box {
                        background: #f8fafc; border: 1px solid #e2e8f0;
                        border-radius: 8px; padding: 10px 14px; margin-bottom: 14px;
                    }
                    .current-pw-box .cpw-label {
                        font-size: 0.72rem; font-weight: 700; color: #94a3b8;
                        text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px;
                    }
                    #pwMatchMsg { font-size: 0.8rem; margin-top: 4px; display: none; }
                </style>

                <div class="table-wrap">
                    <table id="studentTable" class="table table-bordered table-striped table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Photo</th>
                                <th>Full Name</th>
                                <th>Email</th>
                                <th>Mobile No</th>
                                <th>Date of Birth</th>
                                <th>Institute Name</th>
                                <th>Course</th>
                                <th>Admission Year</th>
                                <th>Semester</th>
                                <th style="min-width: 140px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="student, stat : ${liststudent}">
                                <td th:text="${stat.count}"></td>
                                <td>
                                    <div th:if="${student.imageName != null and !student.imageName.isEmpty()}">
                                        <img th:src="@{'/img/' + ${student.imageName}}" 
                                             class="img-circle elevation-1"
                                             style="width: 40px; height: 40px; object-fit: cover; border: 1px solid #dee2e6;">
                                    </div>
                                    <div th:unless="${student.imageName != null and !student.imageName.isEmpty()}">
                                        <i class="fas fa-user-circle fa-2x text-muted"></i>
                                    </div>
                                </td>
                                <td th:text="${student.fullName}"></td>
                                <td th:text="${student.email}"></td>
                                <td th:text="${student.mobileNo}"></td>
                                <td th:text="${student.DateOfBirth}"></td>
                                <td th:text="${student.instituteName}"></td>
                                <td th:text="${student.Course}"></td>
                                <td th:text="${student.AdmissionForYear}"></td>
                                <td th:text="${student.Semister}"></td>
                                <td>
                                    <a class="btn btn-sm btn-primary" th:href="@{'/edit/' + ${student.id}}" title="Edit">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <button type="button" class="btn btn-sm btn-warning pwd-btn"
                                            th:data-email="${student.email}"
                                            th:data-name="${student.fullName}"
                                            title="Change Password">
                                        <i class="fas fa-key"></i>
                                    </button>
                                    <a class="btn btn-sm btn-danger" th:href="@{'/delete/' + ${student.id}}"
                                       onclick="return confirm('Are you sure you want to delete this student?');" title="Delete">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ═══════ Change Password Modal ═══════ -->
        <div class="modal fade" id="changePasswordModal" tabindex="-1" role="dialog" aria-labelledby="cpwModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" role="document" style="max-width: 420px;">
                <div class="modal-content" style="border-radius: 12px; overflow: hidden; border: none; box-shadow: 0 25px 70px rgba(0,0,0,0.18);">
                    <form action="/change-student-password" method="post" id="pwForm" novalidate>
                        <div class="modal-header">
                            <h5 class="modal-title" id="cpwModalLabel">
                                <i class="fas fa-key mr-2"></i>Change Student Password
                            </h5>
                            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>
                        </div>
                        <div class="modal-body" style="padding: 24px 28px;">
                            <div class="text-center">
                                <div class="student-badge">
                                    <i class="fas fa-user-graduate"></i>
                                    <span id="studentNameDisplay"></span>
                                </div>
                            </div>
                            <input type="hidden" name="email" id="studentEmailInput">

                            <!-- Current Password Display -->
                            <div class="current-pw-box">
                                <div class="cpw-label"><i class="fas fa-lock mr-1"></i>Current Password (hashed)</div>
                                <div class="pw-field-wrap">
                                    <input type="password" id="currentPwDisplay" class="form-control form-control-sm"
                                           readonly style="background:#fff; cursor:default; font-family:monospace; font-size:0.78rem;">
                                    <button type="button" class="pw-toggle" onclick="toggleField('currentPwDisplay',this)" tabindex="-1">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <small class="text-muted mt-1 d-block" style="font-size:0.7rem;">
                                    <i class="fas fa-shield-alt mr-1"></i>Stored as BCrypt hash. Enter new password below to update.
                                </small>
                            </div>

                            <!-- New Password -->
                            <div class="form-group">
                                <label for="newPassword" style="font-weight:600;font-size:0.85rem;color:#374151;">
                                    <i class="fas fa-lock-open mr-1 text-primary"></i>New Password
                                </label>
                                <div class="pw-field-wrap">
                                    <input type="password" class="form-control" id="newPassword" name="newPassword"
                                           required minlength="8" placeholder="Minimum 8 characters" oninput="checkPwMatch()">
                                    <button type="button" class="pw-toggle" onclick="toggleField('newPassword',this)" tabindex="-1">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Confirm New Password -->
                            <div class="form-group mb-1">
                                <label for="confirmPassword" style="font-weight:600;font-size:0.85rem;color:#374151;">
                                    <i class="fas fa-check-double mr-1 text-success"></i>Confirm New Password
                                </label>
                                <div class="pw-field-wrap">
                                    <input type="password" class="form-control" id="confirmPassword"
                                           required minlength="8" placeholder="Re-enter new password" oninput="checkPwMatch()">
                                    <button type="button" class="pw-toggle" onclick="toggleField('confirmPassword',this)" tabindex="-1">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <div id="pwMatchMsg"></div>
                            </div>
                        </div>
                        <div class="modal-footer" style="border-top:1px solid #f1f5f9; padding:14px 24px;">
                            <button type="button" class="btn btn-outline-secondary" data-dismiss="modal">
                                <i class="fas fa-times mr-1"></i>Cancel
                            </button>
                            <button type="submit" class="btn btn-primary" id="savePwBtn"
                                    style="background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;min-width:130px;">
                                <i class="fas fa-check mr-1"></i>Save Password
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!--
            NOTE: Do NOT re-load jQuery here — admin-base.html already loads jQuery 3.6 + Bootstrap 4.
            Loading jQuery again would overwrite Bootstrap's modal plugin, breaking $('#...').modal('show').
            DataTables scripts are loaded AFTER the base scripts finish (they append to the page).
        -->
        <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
        <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap4.min.js"></script>
        <script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
        <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.bootstrap4.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
        <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>
        <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.print.min.js"></script>

        <script th:inline="none">
            $(document).ready(function() {
                // Initialize DataTable
                var table = $('#studentTable').DataTable({
                    "responsive": true,
                    "lengthChange": false,
                    "autoWidth": false,
                    "paging": false,
                    "info": false,
                    "order": [[0, 'desc']],
                    "dom": 'frtB',
                    "buttons": [
                        { extend: 'copy',  text: '<i class="fas fa-copy"></i> Copy',  className: 'btn btn-sm btn-secondary mx-1 mb-2' },
                        { extend: 'csv',   text: '<i class="fas fa-file-csv"></i> CSV',   className: 'btn btn-sm btn-info mx-1 mb-2' },
                        { extend: 'excel', text: '<i class="fas fa-file-excel"></i> Excel', className: 'btn btn-sm btn-success mx-1 mb-2' },
                        { extend: 'pdf',   text: '<i class="fas fa-file-pdf"></i> PDF',   className: 'btn btn-sm btn-danger mx-1 mb-2' },
                        { extend: 'print', text: '<i class="fas fa-print"></i> Print', className: 'btn btn-sm btn-warning mx-1 mb-2' }
                    ],
                    "language": {
                        "search": "Search:", 
                        "zeroRecords": "No matching students found"
                    }
                });

                // ── Event delegation: works after DataTables re-renders the DOM ──
                $(document).on('click', '.pwd-btn', function(e) {
                    e.preventDefault();
                    var email = $(this).data('email');
                    var name  = $(this).data('name');

                    if(!email) { alert("Error: Student email not found"); return; }

                    $('#studentEmailInput').val(email);
                    $('#studentNameDisplay').text(name || email);
                    $('#newPassword').val('');
                    $('#confirmPassword').val('');
                    $('#currentPwDisplay').val('Loading...');
                    $('#pwMatchMsg').hide().text('');
                    $('#savePwBtn').prop('disabled', false);

                    // Fetch hashed password via AJAX
                    $.ajax({
                        url: '/api/student-password',
                        data: { email: email },
                        dataType: 'json',
                        success: function(data) {
                            if (data.hashedPassword) {
                                $('#currentPwDisplay').val(data.hashedPassword);
                            } else {
                                $('#currentPwDisplay').val('(not found)');
                            }
                        },
                        error: function(xhr) {
                            var msg = (xhr.status === 401) ? "Unauthorized (login sync issue)" : "Server error (code " + xhr.status + ")";
                            $('#currentPwDisplay').val(msg);
                            console.error("AJAX Error:", xhr);
                        }
                    });

                    // Open modal using Bootstrap
                    $('#changePasswordModal').modal('show');
                });

                // Block submit if passwords don't match
                $('#pwForm').on('submit', function(e) {
                    if ($('#newPassword').val() !== $('#confirmPassword').val()) {
                        e.preventDefault();
                        showPwMsg('Passwords do not match!', 'danger');
                    }
                });
            });

            function toggleField(inputId, btn) {
                var input = document.getElementById(inputId);
                var icon  = btn.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                }
            }

            function checkPwMatch() {
                var np  = document.getElementById('newPassword').value;
                var cp  = document.getElementById('confirmPassword').value;
                var btn = document.getElementById('savePwBtn');
                if (!cp) { document.getElementById('pwMatchMsg').style.display = 'none'; btn.disabled = false; return; }
                if (np === cp) { showPwMsg('✓ Passwords match', 'success'); btn.disabled = false; }
                else           { showPwMsg('✗ Passwords do not match', 'danger'); btn.disabled = true; }
            }

            function showPwMsg(msg, type) {
                var el = document.getElementById('pwMatchMsg');
                el.textContent = msg;
                el.className = 'text-' + type;
                el.style.display = 'block';
            }
        </script>
    </section>
</body>
</html>

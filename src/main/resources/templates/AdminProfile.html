<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin-base::layout(~{::section})}">
<head>
    <meta charset="utf-8">
    <title>Admin Profile</title>
    <style>
        .toggle-password, .toggle-password i {
            transition: none !important;
            animation: none !important;
        }
    </style>
</head>
<body>
    <section th:fragment="content">
        <div class="row">
            <!-- Profile Details Column -->
            <div class="col-lg-7">
                <div class="card shadow-lg" style="border-radius: 20px; overflow: hidden; border: none; height: 100%;">
                    <div class="card-header bg-gradient-primary text-white p-3">
                        <h4 class="card-title mb-0" style="font-weight: 700;">
                            <i class="fas fa-user-edit mr-2"></i>Profile Details
                        </h4>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/save-admin-profile}" method="post" th:object="${user}" id="profileForm">
                            <input type="hidden" name="formToken" th:value="${formToken}">
                            <input type="hidden" th:field="*{id}">
                            
                            <div class="row">
                                <div class="col-md-12 mb-3">
                                    <div class="form-group">
                                        <label style="font-weight: 600; color: #4b5563;">Full Name</label>
                                        <div class="input-group">
                                            <div class="input-group-prepend">
                                                <span class="input-group-text bg-light border-right-0" style="border-radius: 12px 0 0 12px;">
                                                    <i class="fas fa-user text-primary"></i>
                                                </span>
                                            </div>
                                            <input type="text" th:field="*{fullName}" class="form-control bg-light border-left-0" 
                                                   style="border-radius: 0 12px 12px 0;" placeholder="Enter full name" required readonly>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="col-md-12 mb-3">
                                    <div class="form-group">
                                        <label style="font-weight: 600; color: #4b5563;">Email Address</label>
                                        <div class="input-group">
                                            <div class="input-group-prepend">
                                                <span class="input-group-text bg-light border-right-0" style="border-radius: 12px 0 0 12px;">
                                                    <i class="fas fa-envelope text-primary"></i>
                                                </span>
                                            </div>
                                            <input type="email" th:field="*{email}" class="form-control bg-light border-left-0" 
                                                   style="border-radius: 0 12px 12px 0;" readonly>
                                        </div>
                                        <small class="text-muted">Email cannot be changed.</small>
                                    </div>
                                </div>

                                <div class="col-md-12 mb-3">
                                    <div class="form-group">
                                        <label style="font-weight: 600; color: #4b5563;">Mobile Number</label>
                                        <div class="input-group">
                                            <div class="input-group-prepend">
                                                <span class="input-group-text bg-light border-right-0" style="border-radius: 12px 0 0 12px;">
                                                    <i class="fas fa-phone text-primary"></i>
                                                </span>
                                            </div>
                                            <input type="text" th:field="*{mobileNo}" class="form-control bg-light border-left-0" 
                                                   style="border-radius: 0 12px 12px 0;" placeholder="Enter mobile number" readonly>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mt-4 d-flex justify-content-between">
                                <button type="button" id="editBtn" class="btn btn-info px-4" style="border-radius: 12px; font-weight: 600;">
                                    <i class="fas fa-edit mr-2"></i>Edit
                                </button>
                                <button type="submit" id="updateBtn" class="btn btn-primary px-4 d-none" style="border-radius: 12px; font-weight: 600;">
                                    <i class="fas fa-save mr-2"></i>Update Profile
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Change Password Column -->
            <div class="col-lg-5">
                <div class="card shadow-lg" style="border-radius: 20px; overflow: hidden; border: none; height: 100%;">
                    <div class="card-header bg-gradient-danger text-white p-3">
                        <h4 class="card-title mb-0" style="font-weight: 700;">
                            <i class="fas fa-key mr-2"></i>Change Password
                        </h4>
                    </div>
                    <div class="card-body p-4 text-center d-flex flex-column justify-content-center">
                        <form th:action="@{/change-admin-password}" method="post">
                            <input type="hidden" name="formToken" th:value="${formToken}">
                            
                            <div class="row text-left">
                                <div class="col-12 mb-3">
                                    <div class="form-group">
                                        <label style="font-weight: 600; color: #4b5563;">Current Password</label>
                                        <div class="input-group">
                                            <input type="password" name="currentPassword" class="form-control bg-light border-right-0" 
                                                   style="border-radius: 12px 0 0 12px;" required>
                                            <div class="input-group-append">
                                                <span class="input-group-text bg-light border-left-0 toggle-password" 
                                                      style="border-radius: 0 12px 12px 0; cursor: pointer;">
                                                    <i class="fas fa-eye text-primary"></i>
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-12 mb-3">
                                    <div class="form-group">
                                        <label style="font-weight: 600; color: #4b5563;">New Password</label>
                                        <div class="input-group">
                                            <input type="password" name="newPassword" class="form-control bg-light border-right-0" 
                                                   style="border-radius: 12px 0 0 12px;" required>
                                            <div class="input-group-append">
                                                <span class="input-group-text bg-light border-left-0 toggle-password" 
                                                      style="border-radius: 0 12px 12px 0; cursor: pointer;">
                                                    <i class="fas fa-eye text-primary"></i>
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-12 mb-3">
                                    <div class="form-group">
                                        <label style="font-weight: 600; color: #4b5563;">Confirm New Password</label>
                                        <div class="input-group">
                                            <input type="password" name="confirmPassword" class="form-control bg-light border-right-0" 
                                                   style="border-radius: 12px 0 0 12px;" required>
                                            <div class="input-group-append">
                                                <span class="input-group-text bg-light border-left-0 toggle-password" 
                                                      style="border-radius: 0 12px 12px 0; cursor: pointer;">
                                                    <i class="fas fa-eye text-primary"></i>
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="mt-3">
                                <button type="submit" class="btn btn-danger btn-block" style="border-radius: 12px; font-weight: 700; padding: 10px;">
                                    <i class="fas fa-lock mr-2"></i>Update Password
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // Edit Toggle Logic
            document.getElementById('editBtn').addEventListener('click', function() {
                const fullName = document.getElementById('fullName');
                fullName.removeAttribute('readonly');
                fullName.classList.remove('bg-light');
                
                const mobileNo = document.getElementById('mobileNo');
                mobileNo.removeAttribute('readonly');
                mobileNo.classList.remove('bg-light');
                
                this.classList.add('d-none');
                document.getElementById('updateBtn').classList.remove('d-none');
                fullName.focus();
            });

            // Password Toggle Logic
            document.querySelectorAll('.toggle-password').forEach(span => {
                span.addEventListener('click', function() {
                    const input = this.closest('.input-group').querySelector('input');
                    const icon = this.querySelector('i');
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    } else {
                        input.type = 'password';
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    }
                });
            });
        </script>
    </section>
</body>
</html>

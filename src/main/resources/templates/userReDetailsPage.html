<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{student-base::layout(~{::section})}">
<head>
    <meta charset="utf-8">
    <title>Student Details</title>
</head>
<body>
    <section th:fragment="content">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">
                    <i class="fas fa-user-edit mr-2"></i>Complete Your Profile
                </h3>
            </div>
            <div class="card-body">
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle mr-2"></i>
                    <span th:text="${error}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div th:if="${info}" class="alert alert-info alert-dismissible fade show" role="alert">
                    <i class="fas fa-info-circle mr-2"></i>
                    <span th:text="${info}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <form method="post" th:action="@{/stud}" enctype="multipart/form-data" id="studentDetailsForm">
                    <input type="hidden" name="formToken" th:value="${formToken}">
                    <input type="hidden" th:value="${user.email}" name="username">
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="fullName">
                                    <i class="fas fa-user mr-1"></i>Full Name <span class="text-danger">*</span>
                                </label>
                                <input type="text" name="fullName" class="form-control" id="fullName" th:value="${user.fullName}" required />
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="email">
                                    <i class="fas fa-envelope mr-1"></i>Email <span class="text-danger">*</span>
                                </label>
                                <input type="email" name="email" class="form-control" id="email" th:value="${user.email}" readonly />
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="mobileNo">
                                    <i class="fas fa-phone mr-1"></i>Mobile Number <span class="text-danger">*</span>
                                </label>
                                <input type="text" name="mobileNo" class="form-control" id="mobileNo" th:value="${user.mobileNo}" required />
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="dateOfBirth">
                                    <i class="fas fa-calendar-alt mr-1"></i>Date of Birth <span class="text-danger">*</span>
                                </label>
                                <input type="date" id="dateOfBirth" name="DateOfBirth" class="form-control" required
                                       th:max="${T(java.time.LocalDate).now().toString()}"
                                       th:min="${T(java.time.LocalDate).now().minusYears(100).toString()}"
                                       title="Must be at least 10 years ago; no future dates"/>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-12">
                            <div class="form-group">
                                <label for="collegeName">
                                    <i class="fas fa-university mr-1"></i>Institute Name <span class="text-danger">*</span>
                                </label>
                                <input type="text" name="instituteName" class="form-control" id="collegeName" required />
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="course">
                                    <i class="fas fa-graduation-cap mr-1"></i>Course <span class="text-danger">*</span>
                                </label>
                                <select name="Course" class="form-control" id="course" required>
                                    <option value="">Select Course</option>
                                    <option value="MCA">MCA</option>
                                    <option value="MBA">MBA</option>
                                    <option value="BE">BE</option>
                                    <option value="B.TECH">B.TECH</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="admissionYear">
                                    <i class="fas fa-calendar-check mr-1"></i>Admission Year <span class="text-danger">*</span>
                                </label>
                                <select name="AdmissionForYear" class="form-control" id="admissionYear" required>
                                    <option value="">Select Year</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="semister">
                                    <i class="fas fa-book mr-1"></i>Semester <span class="text-danger">*</span>
                                </label>
                                <select name="Semister" class="form-control" id="semister" required>
                                    <option value="">Select Semester</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="profileImage">
                            <i class="fas fa-image mr-1"></i>Profile Image
                        </label>
                        <div class="custom-file">
                            <input type="file" name="img" class="custom-file-input" id="profileImage" accept="image/*">
                            <label class="custom-file-label" for="profileImage">Choose file</label>
                        </div>
                        <small class="form-text text-muted">Upload your profile picture (JPG, PNG, etc.)</small>
                    </div>
                    
                    <div th:if="${session.msg}" class="alert alert-info mt-3">
                        <i class="fas fa-info-circle mr-1"></i><span th:text="${session.msg}"></span>
                    </div>
                    
                    <div class="form-group mt-4">
                        <button type="submit" name="search" class="btn btn-primary btn-lg" id="submitBtn">
                            <i class="fas fa-save mr-1"></i>Save Details
                        </button>
                    </div>
                </form>
            </div>
        </div>
        
        <script th:inline="none">
            // Update file input label
            document.getElementById('profileImage').addEventListener('change', function(e) {
                var fileName = e.target.files[0] ? e.target.files[0].name : 'Choose file';
                e.target.nextElementSibling.textContent = fileName;
            });
            
            // DOB validation: at least 10 years old, no future
            function validateDob() {
                var input = document.getElementById('dateOfBirth');
                if (!input || !input.value) return true;
                var dob = new Date(input.value);
                var today = new Date();
                if (dob > today) {
                    alert('Date of birth cannot be in the future.');
                    return false;
                }
                var age = (today - dob) / (365.25 * 24 * 60 * 60 * 1000);
                if (age < 10) {
                    alert('Student must be at least 10 years old.');
                    return false;
                }
                return true;
            }
            document.getElementById('studentDetailsForm').addEventListener('submit', function(e) {
                if (!validateDob()) {
                    e.preventDefault();
                    return;
                }
                var submitBtn = document.getElementById('submitBtn');
                if (submitBtn) {
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm mr-1"></span>Saving...';
                }
            });
        </script>
    </section>
</body>
</html>

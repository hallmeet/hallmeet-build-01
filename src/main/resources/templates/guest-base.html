<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HallMeet</title>

    <!-- Google Font: Source Sans Pro -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- AdminLTE -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <!-- Modern Theme - 25px Radius -->
    <link rel="stylesheet" href="/css/modern-theme.css">
    <style>
        body.hold-transition.login-page .wrapper {
            width: 100% !important;
            max-width: 100% !important;
        }
        .main-header {
            min-height: 57px;
            background-color: #fff;
            box-shadow: 0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.24);
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
        }
        .main-header .container-fluid {
            width: 100% !important;
            max-width: 100% !important;
            padding-left: 15px;
            padding-right: 15px;
        }
        .main-header .navbar-brand {
            font-size: 1.5rem;
            font-weight: 600;
            color: #007bff !important;
        }
        .main-header .nav-link {
            font-size: 1rem;
            padding: 0.5rem 1rem !important;
            color: #495057 !important;
        }
        .main-header .nav-link:hover {
            color: #007bff !important;
        }
        .login-box {
            width: 100%;
            max-width: 450px;
        }
        .login-logo {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 1.5rem;
        }
        .login-logo a {
            color: #007bff;
            text-decoration: none;
        }
        .login-card-body {
            padding: 2rem !important;
        }
        .navbar-toggler {
            border: 1px solid rgba(0,0,0,.1);
        }
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%280, 0, 0, 0.5%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }
    </style>
</head>
<body class="hold-transition login-page" style="margin: 0; padding: 0; width: 100%;">
<div class="wrapper" style="width: 100%; max-width: 100%; margin: 0; padding: 0;">

    <!-- Floating Pill Navbar Styles -->
    <style>
        .custom-pill-nav-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .main-pill-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 10px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 98%;
            max-width: 1920px;
        }

        .brand-pill {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 10px 25px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
        }

        .brand-pill a {
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: none;
            cursor: default;
        }

        .options-pill {
            background: #ffffff;
            padding: 8px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.05);
        }

        .colorful-pill-btn {
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            color: #ffffff !important;
            text-decoration: none !important;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            border: none;
        }

        .colorful-pill-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            color: #ffffff !important;
        }

        .btn-opt-1 { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); color: #333 !important; }
        .btn-opt-1:hover { color: #333 !important; }
        
        .btn-opt-2 { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }
        .btn-opt-3 { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); color: #0f172a !important; }
        .btn-opt-3:hover { color: #0f172a !important; }
        
        .btn-opt-4 { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); }

        @media (max-width: 992px) {
            .main-pill-container {
                flex-direction: column;
                border-radius: 25px;
                gap: 15px;
            }
            .options-pill {
                flex-wrap: wrap;
                justify-content: center;
                border-radius: 25px;
            }
        }
    </style>

    <!-- Custom Floating Pill Navbar -->
    <div class="custom-pill-nav-wrapper">
        <div class="main-pill-container">
            <!-- First Inner Pill: Brand -->
            <div class="brand-pill">
                <a href="javascript:void(0);">
                    <i class="fas fa-ticket-alt"></i>
                    <span>HallMeet</span>
                </a>
            </div>

            <!-- Second Inner Pill: Options -->
            <div class="options-pill">
                <a href="/" class="colorful-pill-btn btn-opt-1">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="/registration" class="colorful-pill-btn btn-opt-2">
                    <i class="fas fa-user-plus"></i> Student Registration
                </a>
                <a href="/signin_page" class="colorful-pill-btn btn-opt-3">
                    <i class="fas fa-sign-in-alt"></i> Student Login
                </a>
                <a href="/AdminLoginPage" class="colorful-pill-btn btn-opt-4">
                    <i class="fas fa-user-shield"></i> Admin Login
                </a>
            </div>
        </div>
    </div>
    
    <!-- Spacing adapter since navbar is absolute -->
    <div style="height: 100px; width: 100%;"></div>

    <!-- Main content -->
    <div class="content-wrapper" style="background: transparent;">
        <section class="content">
            <div class="container-fluid">
                <!-- Flash Messages -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle mr-2"></i>
                    <span th:text="${success}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle mr-2"></i>
                    <span th:text="${error}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div th:if="${loginError}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle mr-2"></i>
                    <span th:text="${loginError}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>

                <!-- Page Content -->
                <div th:replace="${content}"></div>
            </div>
        </section>
    </div>

    <!-- Footer -->
    <footer class="main-footer" style="margin-left: 0;">
        <strong>Copyright &copy; 2026 <a href="/about">HallMeet</a>.</strong>
        All rights reserved.
    </footer>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<!-- Bootstrap 4 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- AdminLTE App -->
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        setTimeout(function() {
            var alerts = document.querySelectorAll('.alert');
            alerts.forEach(function(alert) {
                if (typeof $ !== 'undefined' && $.fn.alert) {
                    $(alert).alert('close');
                } else {
                    alert.style.display = 'none';
                }
            });
        }, 5000);

    });
</script>
</body>
</html>

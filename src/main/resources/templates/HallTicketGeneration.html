<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin-base::layout(~{::section})}">
<head>
    <meta charset="utf-8">
    <title>Generate Hall Ticket - HallMeet</title>
    <style>
        .ht-wrapper {
            max-width: 820px;
            margin: 0 auto 30px;
        }

        /* ---- Main ticket card ---- */
        .ht-card {
            background: white;
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.07);
            overflow: hidden;
        }

        /* ---- Header band ---- */
        .ht-header {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            padding: 22px 28px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .ht-header h2 {
            margin: 0;
            font-weight: 800;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ht-header .exam-info {
            font-size: 0.82rem;
            opacity: 0.85;
            margin-top: 4px;
        }

        .ht-id-badge {
            background: rgba(255,255,255,0.18);
            border-radius: 999px;
            padding: 4px 14px;
            font-size: 0.78rem;
            font-weight: 700;
        }

        /* ---- Body ---- */
        .ht-body {
            padding: 28px;
        }

        /* ---- Candidate row ---- */
        .candidate-row {
            display: flex;
            gap: 24px;
            margin-bottom: 28px;
        }

        /* Photo – fixed, compact size */
        .photo-box {
            flex-shrink: 0;
            width: 100px;
            height: 120px;
            border-radius: 10px;
            overflow: hidden;
            border: 3px solid #f1f5f9;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Info grid – 2×2 compact tiles */
        .info-tiles {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .tile {
            background: #f8fafc;
            border-radius: 10px;
            padding: 10px 14px;
            border-left: 3px solid #6366f1;
        }

        .tile .lbl {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
            margin-bottom: 2px;
        }

        .tile .val {
            font-size: 0.92rem;
            font-weight: 700;
            color: #1e293b;
        }

        .tile.accent .val { color: #4f46e5; }

        /* ---- Divider ---- */
        .ht-divider {
            border: none;
            border-top: 2px dashed #e2e8f0;
            margin: 18px 0;
        }

        .section-label {
            font-size: 0.73rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 10px;
        }

        /* ---- Subject table ---- */
        .sub-table {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            border-collapse: separate;
            border-spacing: 0;
        }

        .sub-table thead th {
            background: #4f46e5;
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 11px 14px;
            border: none;
        }

        .sub-table tbody td {
            padding: 10px 14px;
            font-size: 0.88rem;
            color: #334155;
            border-top: 1px solid #f1f5f9;
        }

        /* ---- Ticket footer (QR + signature) ---- */
        .ht-foot {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 28px;
            padding-top: 18px;
            border-top: 2px dashed #e2e8f0;
        }

        .qr-area {
            text-align: center;
        }

        .qr-area img {
            width: 80px;
            height: 80px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 3px;
        }

        .qr-area .qr-placeholder {
            width: 80px;
            height: 80px;
            background: #f1f5f9;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
        }

        .sign-area {
            text-align: center;
            min-width: 180px;
        }

        .sign-line {
            border-top: 1px solid #1e293b;
            margin-top: 40px;
            padding-top: 5px;
            font-weight: 700;
            font-size: 0.78rem;
            text-transform: uppercase;
            color: #1e293b;
        }

        /* ---- Action footer ---- */
        .ht-actions {
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            padding: 16px 28px;
            text-align: center;
        }

        .btn-issue {
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: white;
            border: none;
            border-radius: 999px;
            padding: 11px 40px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(99,102,241,0.35);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-issue:hover {
            background: linear-gradient(135deg, #4338ca, #4f46e5);
            box-shadow: 0 6px 18px rgba(99,102,241,0.45);
            transform: translateY(-1px);
        }

        .btn-issue:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        @media print {
            .no-print,
            .main-header,
            .main-sidebar,
            .main-footer,
            .content-header { display: none !important; }

            .content-wrapper {
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
            }

            .ht-card {
                box-shadow: none;
                border: 1px solid #ddd;
                border-radius: 0;
            }

            .ht-header {
                background: #f1f5f9 !important;
                color: #000 !important;
                border-bottom: 2px solid #4f46e5;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .ht-header h2, .ht-header .exam-info { color: #000 !important; }
        }
    </style>
</head>
<body>
    <section th:fragment="content">
        <div class="ht-wrapper">

            <!-- Top nav buttons -->
            <div class="d-flex justify-content-between mb-3 no-print">
                <a href="javascript:history.back()" class="btn btn-default btn-sm rounded-pill px-3">
                    <i class="fas fa-arrow-left mr-1"></i> Back
                </a>
                <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill px-3" onclick="window.print()">
                    <i class="fas fa-eye mr-1"></i> Preview
                </button>
            </div>

            <div class="ht-card">
                <form th:action="@{/save_hall}" th:object="${hall}" method="post" enctype="multipart/form-data">
                    <!-- Hidden fields -->
                    <input type="hidden" name="formToken" th:value="${formToken}">
                    <input type="hidden" th:field="*{id}">
                    <input type="hidden" th:field="*{ExamName}">
                    <input type="hidden" th:value="${(exam?.Course ?: '') + (exam?.Year ?: '') + (exam?.Semister ?: '') + (hall?.id ?: '')}" th:field="*{SeatNo}">
                    <input type="hidden" th:field="*{StudentName}">
                    <input type="hidden" th:field="*{instituteName}">
                    <input type="hidden" th:field="*{email}">
                    <input type="hidden" th:value="${(exam?.Sub1 ?: '') + (exam?.date1 ?: '') + (exam?.time1 ?: '')}" th:field="*{sub1}">
                    <input type="hidden" th:value="${(exam?.Sub2 ?: '') + (exam?.date2 ?: '') + (exam?.time2 ?: '')}" th:field="*{sub2}">
                    <input type="hidden" th:value="${(exam?.Sub3 ?: '') + (exam?.date3 ?: '') + (exam?.time3 ?: '')}" th:field="*{sub3}">
                    <input type="hidden" th:value="${(exam?.Sub4 ?: '') + (exam?.date4 ?: '') + (exam?.time4 ?: '')}" th:field="*{sub4}">
                    <input type="hidden" th:value="${(exam?.Sub5 ?: '') + (exam?.date5 ?: '') + (exam?.time5 ?: '')}" th:field="*{sub5}">
                    <input type="hidden" th:value="${(exam?.Sub6 ?: '') + (exam?.date6 ?: '') + (exam?.time6 ?: '')}" th:field="*{sub6}">
                    <input type="hidden" th:field="*{Status}" th:value="Approved">

                    <!-- Header -->
                    <div class="ht-header">
                        <div>
                            <h2><i class="fas fa-id-card mr-2" style="font-size:1.1rem;"></i> E-Hall Ticket</h2>
                            <div class="exam-info" th:text="${hall.ExamName}">Examination</div>
                        </div>
                        <div class="ht-id-badge">ID: <span th:text="${hall.id}"></span></div>
                    </div>

                    <!-- Body -->
                    <div class="ht-body">

                        <!-- Candidate row: photo + info tiles -->
                        <div class="candidate-row">
                            <!-- Fixed-size photo box -->
                            <div class="photo-box">
                                <th:block th:if="${stud != null and stud.imageName != null and !stud.imageName.isEmpty()}">
                                    <input type="hidden" th:field="*{imageName}" th:value="${stud.imageName}">
                                    <img th:src="@{'/img/' + ${stud.imageName}}" alt="Photo">
                                </th:block>
                                <th:block th:unless="${stud != null and stud.imageName != null and !stud.imageName.isEmpty()}">
                                    <input type="hidden" name="imageName" value="">
                                    <i class="fas fa-user-graduate fa-2x"></i>
                                </th:block>
                            </div>

                            <!-- Info tiles -->
                            <div class="info-tiles">
                                <div class="tile">
                                    <div class="lbl">Candidate Name</div>
                                    <div class="val" th:text="${hall.StudentName}">-</div>
                                </div>
                                <div class="tile accent">
                                    <div class="lbl">Seat Number</div>
                                    <div class="val" th:text="${(exam?.Course ?: '') + (exam?.Year ?: '') + (exam?.Semister ?: '') + (hall?.id ?: '')}">-</div>
                                </div>
                                <div class="tile">
                                    <div class="lbl">Institution</div>
                                    <div class="val" th:text="${hall.instituteName}">-</div>
                                </div>
                                <div class="tile">
                                    <div class="lbl">Hall Ticket No</div>
                                    <div class="val" th:text="${hall.id}">-</div>
                                </div>
                            </div>
                        </div>

                        <hr class="ht-divider">

                        <div class="section-label"><i class="fas fa-calendar-check mr-1"></i> Examination Schedule</div>

                        <!-- Subjects table -->
                        <table class="sub-table">
                            <thead>
                                <tr>
                                    <th style="width:7%">Sr.</th>
                                    <th style="width:53%">Subject</th>
                                    <th style="width:22%">Date</th>
                                    <th style="width:18%">Time</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- JSON subjects -->
                                <th:block th:if="${exam != null and exam.subjects != null and !exam.subjects.isEmpty()}">
                                    <tr th:each="s, iter : ${exam.subjects}" th:if="${s.name != null and !s.name.isEmpty()}">
                                        <td th:text="${iter.count}"></td>
                                        <td style="font-weight:600;" th:text="${s.name}"></td>
                                        <td th:text="${s.date ?: '-'}"></td>
                                        <td th:text="${s.time ?: '-'}"></td>
                                    </tr>
                                </th:block>
                                <!-- Legacy fallback -->
                                <th:block th:if="${exam != null and (exam.subjects == null or exam.subjects.isEmpty())}">
                                    <tr th:if="${exam.Sub1 != null and !exam.Sub1.isEmpty()}">
                                        <td>1</td><td style="font-weight:600;" th:text="${exam.Sub1}"></td><td th:text="${exam.date1 ?: '-'}"></td><td th:text="${exam.time1 ?: '-'}"></td>
                                    </tr>
                                    <tr th:if="${exam.Sub2 != null and !exam.Sub2.isEmpty()}">
                                        <td>2</td><td style="font-weight:600;" th:text="${exam.Sub2}"></td><td th:text="${exam.date2 ?: '-'}"></td><td th:text="${exam.time2 ?: '-'}"></td>
                                    </tr>
                                    <tr th:if="${exam.Sub3 != null and !exam.Sub3.isEmpty()}">
                                        <td>3</td><td style="font-weight:600;" th:text="${exam.Sub3}"></td><td th:text="${exam.date3 ?: '-'}"></td><td th:text="${exam.time3 ?: '-'}"></td>
                                    </tr>
                                    <tr th:if="${exam.Sub4 != null and !exam.Sub4.isEmpty()}">
                                        <td>4</td><td style="font-weight:600;" th:text="${exam.Sub4}"></td><td th:text="${exam.date4 ?: '-'}"></td><td th:text="${exam.time4 ?: '-'}"></td>
                                    </tr>
                                    <tr th:if="${exam.Sub5 != null and !exam.Sub5.isEmpty()}">
                                        <td>5</td><td style="font-weight:600;" th:text="${exam.Sub5}"></td><td th:text="${exam.date5 ?: '-'}"></td><td th:text="${exam.time5 ?: '-'}"></td>
                                    </tr>
                                    <tr th:if="${exam.Sub6 != null and !exam.Sub6.isEmpty()}">
                                        <td>6</td><td style="font-weight:600;" th:text="${exam.Sub6}"></td><td th:text="${exam.date6 ?: '-'}"></td><td th:text="${exam.time6 ?: '-'}"></td>
                                    </tr>
                                </th:block>
                                <tr th:if="${exam == null}">
                                    <td colspan="4" style="text-align:center;padding:16px;color:#94a3b8;font-style:italic;">No exam details found.</td>
                                </tr>
                            </tbody>
                        </table>

                        <!-- QR + Signature footer -->
                        <div class="ht-foot">
                            <div class="qr-area">
                                <div th:if="${hall?.qrName != null}">
                                    <img th:src="@{'/qr/' + ${hall.qrName}}" alt="QR">
                                    <div style="font-size:0.65rem;font-weight:700;color:#64748b;margin-top:4px;">SCAN TO VERIFY</div>
                                </div>
                                <div th:unless="${hall?.qrName != null}" class="qr-placeholder">
                                    <i class="fas fa-qrcode fa-2x"></i>
                                </div>
                            </div>
                            <div class="sign-area">
                                <div class="sign-line">Controller of Examinations</div>
                            </div>
                        </div>
                    </div>

                    <!-- Issue button -->
                    <div class="ht-actions no-print">
                        <button type="submit" class="btn-issue" id="issueBtn">
                            <span id="issueSpinner" class="spinner-border spinner-border-sm d-none"></span>
                            <i class="fas fa-check-circle" id="issueIcon"></i>
                            <span id="issueText">Issue Hall Ticket</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            document.querySelector('form').addEventListener('submit', function() {
                var btn = document.getElementById('issueBtn');
                if (btn) {
                    btn.disabled = true;
                    document.getElementById('issueSpinner').classList.remove('d-none');
                    document.getElementById('issueIcon').classList.add('d-none');
                    document.getElementById('issueText').textContent = 'Generating...';
                }
            });
        </script>
    </section>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hall Ticket - HallMeet</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            padding: 30px 15px;
        }

        .page-wrapper {
            max-width: 800px;
            margin: 0 auto;
        }

        .ticket-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        /* ---- HEADER ---- */
        .ticket-header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 24px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ticket-header-left h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .ticket-header-left p {
            color: rgba(255,255,255,0.7);
            font-size: 0.82rem;
            margin: 4px 0 0;
        }

        .ticket-status-badge {
            background: #22c55e;
            color: white;
            border-radius: 999px;
            padding: 5px 14px;
            font-weight: 700;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* ---- BODY ---- */
        .ticket-body {
            padding: 30px;
        }

        /* ---- CANDIDATE SECTION ---- */
        .candidate-row {
            display: flex;
            gap: 25px;
            margin-bottom: 30px;
        }

        .candidate-photo {
            flex-shrink: 0;
            width: 110px;
            height: 130px;
            border-radius: 12px;
            border: 3px solid #f1f5f9;
            object-fit: cover;
            background: #f8fafc;
        }

        .candidate-photo-placeholder {
            width: 110px;
            height: 130px;
            border-radius: 12px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            flex-shrink: 0;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            flex: 1;
        }

        .info-item {
            background: #f8fafc;
            border-radius: 10px;
            padding: 10px 15px;
            border-left: 3px solid #6366f1;
        }

        .info-item .label {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #94a3b8;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .info-item .value {
            font-size: 0.95rem;
            font-weight: 700;
            color: #1e293b;
        }

        .info-item.accent .value {
            color: #6366f1;
        }

        /* ---- DIVIDER ---- */
        .section-divider {
            border: none;
            border-top: 2px dashed #e2e8f0;
            margin: 20px 0;
        }

        .section-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ---- SUBJECT TABLE ---- */
        .subject-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .subject-table thead th {
            background: #6366f1;
            color: white;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 16px;
            border: none;
        }

        .subject-table tbody td {
            padding: 11px 16px;
            font-size: 0.9rem;
            color: #334155;
            border-top: 1px solid #f1f5f9;
            background: white;
        }

        .subject-table tbody tr:last-child td {
            border-bottom: none;
        }

        .no-subjects {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
            font-style: italic;
        }

        /* ---- FOOTER ---- */
        .ticket-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #e2e8f0;
        }

        .qr-box {
            text-align: center;
        }

        .qr-img {
            width: 90px;
            height: 90px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 4px;
        }

        .sign-box {
            text-align: center;
            min-width: 180px;
        }

        .sign-line {
            border-top: 1px solid #1e293b;
            margin-top: 45px;
            padding-top: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #1e293b;
        }

        /* ---- ACTION BUTTONS ---- */
        .action-bar {
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            padding: 18px 30px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn-modern {
            border-radius: 999px;
            padding: 8px 22px;
            font-weight: 600;
            font-size: 0.88rem;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-download {
            background: #6366f1;
            color: white;
        }

        .btn-download:hover {
            background: #4f46e5;
            color: white;
            text-decoration: none;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99,102,241,0.3);
        }

        .btn-print {
            background: #f1f5f9;
            color: #334155;
        }

        .btn-print:hover {
            background: #e2e8f0;
        }

        /* ---- ERROR STATE ---- */
        .error-card {
            background: white;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
        }

        @media print {
            body { background: white; padding: 0; }
            .action-bar, .no-print { display: none !important; }
            .ticket-card { box-shadow: none; border-radius: 0; border: 1px solid #ddd; }
            .ticket-header { background: #1e293b !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .subject-table thead th { background: #6366f1 !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">

        <!-- Error State -->
        <div th:if="${error}" class="error-card">
            <i class="fas fa-exclamation-triangle fa-3x text-warning mb-3"></i>
            <h4 class="font-weight-bold">Cannot Display Hall Ticket</h4>
            <p class="text-muted" th:text="${error}">Error message</p>
            <a href="/" class="btn-modern btn-download" style="text-decoration:none; display: inline-flex;">
                <i class="fas fa-home"></i> Go Home
            </a>
        </div>

        <!-- Main ticket -->
        <div th:if="${error == null}" class="ticket-card">

            <div class="ticket-header">
                <div class="ticket-header-left">
                    <h1>E-Hall Ticket</h1>
                    <p th:text="${hall?.ExamName ?: 'Examination Portal'}">Examination</p>
                </div>
                <div class="ticket-status-badge">
                    <i class="fas fa-check-circle"></i> Approved
                </div>
            </div>

            <div class="ticket-body">

                <!-- Candidate info -->
                <div class="candidate-row">
                    <!-- Photo -->
                    <div th:if="${stud != null and stud.imageName != null and !stud.imageName.isEmpty()}">
                        <img th:src="@{'/img/' + ${stud.imageName}}" class="candidate-photo" alt="Photo"
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div class="candidate-photo-placeholder" style="display:none;">
                            <i class="fas fa-user-circle fa-3x"></i>
                        </div>
                    </div>
                    <div th:unless="${stud != null and stud.imageName != null and !stud.imageName.isEmpty()}"
                         class="candidate-photo-placeholder">
                        <i class="fas fa-user-circle fa-3x"></i>
                    </div>

                    <!-- Details grid -->
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="label">Candidate Name</div>
                            <div class="value" th:text="${hall?.StudentName ?: 'N/A'}">-</div>
                        </div>
                        <div class="info-item accent">
                            <div class="label">Seat Number</div>
                            <div class="value" th:text="${hall?.SeatNo ?: 'N/A'}">-</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Institution</div>
                            <div class="value" th:text="${hall?.instituteName ?: 'N/A'}">-</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Hall Ticket No</div>
                            <div class="value" th:text="${hall?.id}">-</div>
                        </div>
                    </div>
                </div>

                <hr class="section-divider">

                <!-- Subjects -->
                <div class="section-title">
                    <i class="fas fa-calendar-alt text-indigo-500"></i> Examination Schedule
                </div>

                <table class="subject-table">
                    <thead>
                        <tr>
                            <th width="8%">Sr.</th>
                            <th width="52%">Subject</th>
                            <th width="22%">Date</th>
                            <th width="18%">Time</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 1. Hall Ticket JSON subjects (Source of Truth) -->
                        <th:block th:if="${hall != null and hall.subjects != null and !hall.subjects.isEmpty()}">
                            <tr th:each="s, iter : ${hall.subjects}"
                                th:if="${s.name != null and !s.name.isEmpty()}">
                                <td th:text="${iter.count}"></td>
                                <td style="font-weight:600;" th:text="${s.name}"></td>
                                <td th:text="${s.date ?: '-'}"></td>
                                <td th:text="${s.time ?: '-'}"></td>
                            </tr>
                        </th:block>

                        <!-- 2. Exam JSON subjects fallback -->
                        <th:block th:if="${(hall == null or hall.subjects == null or hall.subjects.isEmpty()) and exam != null and exam.subjects != null and !exam.subjects.isEmpty()}">
                            <tr th:each="s, iter : ${exam.subjects}"
                                th:if="${s.name != null and !s.name.isEmpty()}">
                                <td th:text="${iter.count}"></td>
                                <td style="font-weight:600;" th:text="${s.name}"></td>
                                <td th:text="${s.date ?: '-'}"></td>
                                <td th:text="${s.time ?: '-'}"></td>
                            </tr>
                        </th:block>

                        <!-- 3. Legacy field fallback -->
                        <th:block th:if="${(hall == null or hall.subjects == null or hall.subjects.isEmpty()) and exam != null and (exam.subjects == null or exam.subjects.isEmpty())}">
                            <tr th:if="${exam.Sub1 != null and !exam.Sub1.isEmpty()}">
                                <td>1</td><td style="font-weight:600;" th:text="${exam.Sub1}"></td>
                                <td th:text="${exam.date1 ?: '-'}"></td><td th:text="${exam.time1 ?: '-'}"></td>
                            </tr>
                            <tr th:if="${exam.Sub2 != null and !exam.Sub2.isEmpty()}">
                                <td>2</td><td style="font-weight:600;" th:text="${exam.Sub2}"></td>
                                <td th:text="${exam.date2 ?: '-'}"></td><td th:text="${exam.time2 ?: '-'}"></td>
                            </tr>
                            <tr th:if="${exam.Sub3 != null and !exam.Sub3.isEmpty()}">
                                <td>3</td><td style="font-weight:600;" th:text="${exam.Sub3}"></td>
                                <td th:text="${exam.date3 ?: '-'}"></td><td th:text="${exam.time3 ?: '-'}"></td>
                            </tr>
                            <tr th:if="${exam.Sub4 != null and !exam.Sub4.isEmpty()}">
                                <td>4</td><td style="font-weight:600;" th:text="${exam.Sub4}"></td>
                                <td th:text="${exam.date4 ?: '-'}"></td><td th:text="${exam.time4 ?: '-'}"></td>
                            </tr>
                            <tr th:if="${exam.Sub5 != null and !exam.Sub5.isEmpty()}">
                                <td>5</td><td style="font-weight:600;" th:text="${exam.Sub5}"></td>
                                <td th:text="${exam.date5 ?: '-'}"></td><td th:text="${exam.time5 ?: '-'}"></td>
                            </tr>
                            <tr th:if="${exam.Sub6 != null and !exam.Sub6.isEmpty()}">
                                <td>6</td><td style="font-weight:600;" th:text="${exam.Sub6}"></td>
                                <td th:text="${exam.date6 ?: '-'}"></td><td th:text="${exam.time6 ?: '-'}"></td>
                            </tr>
                        </th:block>

                        <!-- No exam at all -->
                        <tr th:if="${exam == null and (hall == null or hall.subjects == null or hall.subjects.isEmpty())}">
                            <td colspan="4" class="no-subjects">Exam details not available.</td>
                        </tr>
                    </tbody>
                </table>

                <!-- Footer with QR + Signature -->
                <div class="ticket-footer">
                    <div class="qr-box">
                        <div th:if="${hall?.qrName != null}">
                            <img th:src="@{'/qr/' + ${hall.qrName}}" class="qr-img" alt="QR Code">
                            <div style="font-size:0.7rem;font-weight:700;color:#64748b;margin-top:4px;">SCAN TO VERIFY</div>
                        </div>
                        <div th:unless="${hall?.qrName != null}"
                             style="width:90px;height:90px;background:#f1f5f9;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#94a3b8;">
                            <i class="fas fa-qrcode fa-2x"></i>
                        </div>
                    </div>
                    <div class="sign-box">
                        <div class="sign-line">Controller of Examinations</div>
                    </div>
                </div>
            </div>

            <!-- Action buttons -->
            <div class="action-bar no-print">
                <a th:if="${hall != null}" th:href="@{'/hall-ticket/download/' + ${hall.id}}"
                   class="btn-modern btn-download">
                    <i class="fas fa-file-pdf"></i> Download PDF
                </a>
                <button type="button" class="btn-modern btn-print" onclick="window.print()">
                    <i class="fas fa-print"></i> Print
                </button>
            </div>
        </div>
    </div>
</body>
</html>

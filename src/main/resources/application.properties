# Database Configuration
# Use environment variables or update these values for your system
# Default values are provided for Docker MySQL setup
# For Docker: DB_HOST=localhost, DB_USERNAME=halluser, DB_PASSWORD=hallpass123
# For Local MySQL (Windows): DB_USERNAME=root, DB_PASSWORD=your_password
# For Local MySQL (with created user): DB_USERNAME=halluser, DB_PASSWORD=hallpass123
#
# IMPORTANT: Tables are created automatically via JPA/Hibernate (ddl-auto=update)
# No migration scripts needed - just ensure database exists!
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hall_ticket}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:Vir@2005}}
# Run data.sql after schema creation (seeds default admin when using MySQL)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JPA/Hibernate Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Thymeleaf Configuration
spring.thymeleaf.cache=false

# Spring Boot DevTools Configuration for Hot Reload
# Hot reload works when running via: ./mvnw spring-boot:run or from IDE
# It does NOT work when running the JAR file (./start.sh)
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.additional-paths=src/main/java,src/main/resources
spring.devtools.restart.exclude=static/**,public/**,templates/**,META-INF/maven/**,META-INF/resources/**

# LiveReload server port (default: 35729)
# Browser extension will automatically reload when code changes
spring.devtools.livereload.port=35729

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server Configuration (optional - uncomment to change port)
# server.port=8080